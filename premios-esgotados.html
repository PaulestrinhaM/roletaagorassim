<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Prêmios Esgotados</title>
    <style>
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background: #0b00a5;
        color: #fff;
        font-family: Arial, sans-serif;
        text-align: center;
      }
      h1 {
        font-size: 48px;
        font-weight: bold;
        margin-bottom: 30px;
      }
      .btn {
        background: #fff;
        color: #0b00a5;
        padding: 14px 28px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 18px;
        font-weight: bold;
        text-decoration: none;
        transition: 0.2s;
      }
      .btn:hover {
        background: #f0f0f0;
      }
    </style>
  </head>
  <body>
    <h1>Prêmios Esgotados</h1>
    <a href="controle.html" class="btn">Ir para o Controle</a>
  </body>
</html>
